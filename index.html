                    p2 = map.latLngToLayerPoint(end);
                const angle =

                    className: "arrow-icon",
                    html: `<svg width="20" height="20" style="transform: rotate(${angle}deg);"><path d="M 4 10 L 16 10 M 11 5 L 16 10 L 11 15" stroke="#8b1e1e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`,

                        // 兼容性处理：如果数据里写的是“北京”，统一映射到坐标库里的“北平”
                        let coordKey = cityKey;

                        // 当且仅当地理位置发生变化时，序号才增加
                        // 这样可以确保：上海(1) -> 武汉(2) -> 上海(3) 的逻辑正确
                        if (d.cityKey !== lastCityKey) {
                            step++;
                            segments.push({
                                step: step,
                                city: d.cityKey,
                                coord: mainCities[d.cityKey],
                            });
                            lastCityKey = d.cityKey;
                        }
                    });

                    // 4. 提取绘图路径并归纳每个城市的序号集合
                    segments.forEach((seg) => {
                        path.push(seg.coord);
                        if (!groups[seg.city]) groups[seg.city] = [];
                        groups[seg.city].push(seg.step);
                    });

                    // 5. 绘制轨迹线与箭头
                    for (let i = 0; i < path.length - 1; i++) {
                        const start = path[i];
                        const end = path[i + 1];

                        // 如果坐标相同（保险处理），不画线
                        if (start[0] === end[0] && start[1] === end[1])
                            continue;

                        L.polyline([start, end], {
                            color: "#8b1e1e",
                            weight: 1.5,
                            dashArray: "5, 8",
                            opacity: 0.4,
                        }).addTo(dataLayer);

                        // 绘制指向箭头
                        const midLat = start[0] + (end[0] - start[0]) * 0.6;
                        const midLng = start[1] + (end[1] - start[1]) * 0.6;
                        L.marker([midLat, midLng], {
                            icon: createArrow(start, end),
                            interactive: false,
                        }).addTo(dataLayer);
                    }

                    // 6. 绘制城市 Marker（展示合并后的序号，如 "1, 3, 5"）
                    Object.keys(groups).forEach((cKey) => {
                        const marker = L.marker(mainCities[cKey], {
                            icon: L.divIcon({
                                className: "dynamic-dot",
                                html: `<span>${groups[cKey].join(", ")}</span>`,
                            }),
                        }).addTo(dataLayer);

                        marker.on("click", () => {
                            // 点击查看该城市在原始数据中的所有条目
                            const cityItems = processedData.filter(
                                (d) => d.cityKey === cKey,
                            );
                            showDrawer(cityItems);
                        });
                    });
                } else {
                    // 单年显示模式：按原始顺序筛选当年数据
                    const yearData = processedData.filter(
                        (d) => Number(d.年份) === selYear,
                    );
                    const cityCounts = {};

                    yearData.forEach((d) => {
                        cityCounts[d.cityKey] =
                            (cityCounts[d.cityKey] || 0) + 1;
                    });

                    Object.keys(cityCounts).forEach((cKey) => {
                        L.marker(mainCities[cKey], {
                            icon: L.divIcon({
                                className: "dynamic-dot",
                                html: `<span>${cityCounts[cKey]}</span>`,
                            }),
                        })
                            .addTo(dataLayer)
                            .on("click", () => {
                                const items = yearData.filter(
                                    (d) => d.cityKey === cKey,
                                );
                                showDrawer(items);
                            });
                    });
                }
            }
            function showDrawer(items) {
                const list = document.getElementById("cardList");
                // 基础头部
                list.innerHTML = `<div style="font-size:18px; font-weight:bold; color:#333; margin-bottom:20px; padding-bottom:10px; border-bottom:2px solid #8b1e1e;">${items[0].活动地点}</div>`;

                items.forEach((item) => {
                    // --- 逻辑点 1: 插入冲击力转型卡片 ---
                    // 判断标准：1934年 且 地点包含“湘西”
                    if (
                        item.年份 === 1934 &&
                        item.活动地点 &&
                        item.活动地点.includes("湘西")
                    ) {
                        const impactCard = document.createElement("div");
                        // 样式完全复现图片中的深红色质感
                        impactCard.style = `
                            background: linear-gradient(90deg, #7b1313 0%, #a12323 100%);
                            color: #fff;
                            padding: 30px 20px;
                            margin-bottom: 25px;
                            border-radius: 4px;
                            position: relative;
                            overflow: hidden;
                            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                            font-family: "STKaiti", "KaiTi", serif;
                        `;
                        impactCard.innerHTML = `
                            <div style="font-family:sans-serif; font-size:11px; letter-spacing:2px; opacity:0.7; margin-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.3); display:inline-block;">IDEOLOGICAL TRANSITION</div>
                            <div style="font-size:22px; font-weight:bold; line-height:1.4; border-left:3px solid #fff; padding-left:15px; margin:10px 0;">从「激愤写实」转向「神性重塑」</div>
                            <div style="font-size:14px; opacity:0.9; margin-top:12px; font-style:italic;">在此之后的流寓，不再是单纯的逃避，而是对民族灵魂的深度追溯。</div>
                            <div style="position:absolute; right:-10px; bottom:-20px; font-size:120px; opacity:0.1; pointer-events:none;">沈</div>
                        `;
                        list.appendChild(impactCard);
                    }

                    // --- 逻辑点 2: 保持原有常规卡片结构 ---
                    const card = document.createElement("div");
                    card.className = "info-card";
                    card.innerHTML = `
                        <div class="info-header">
                            <div class="info-title">${item.系年作品 || "生活实录"}</div>
                            <div class="info-tag">${item.系年作品文体 || "动态"}</div>
                        </div>
                        <div class="info-grid">
                            <div class="info-cell"><span class="info-label">具体时间</span>${item.年份}年${item.月 ? item.月 + "月" : ""}</div>
                            <div class="info-cell"><span class="info-label">活动身份</span>${item.活动身份}</div>
                            <div class="info-cell"><span class="info-label">主要交游</span>${item.交游者姓名 || "暂无"}</div>
                            <div class="info-cell"><span class="info-label">详细地点</span>${item.活动地点补充 || item.活动地点}</div>
                        </div>
                        <div class="info-content-box">${item.活动内容或创作缘起}</div>

                        ${item.备注 ? `<div class="info-remark"><span style="color:#8b1e1e; font-weight:bold; font-style:normal; margin-right:5px;">注：</span>${item.备注}</div>` : ""}
                    `;
                    list.appendChild(card);
                });

                document.getElementById("infoDrawer").classList.add("active");
            }
            document
                .getElementById("yearSlider")
                .addEventListener("input", render);
            document
                .getElementById("allTrackToggle")
                .addEventListener("change", render);
            document
                .getElementById("closeBtn")
                .addEventListener("click", () =>
                    document
                        .getElementById("infoDrawer")
                        .classList.remove("active"),
                );

            render();
        </script>
    </body>
</html>
